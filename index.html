<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Global News</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- СВЕТЛАЯ ТЕМА --- */
        :root {
            --bg-color: #f4f6f8;
            --text-color: #1d1d1f;
            --text-muted: #86868b;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --accent-color: #0066cc;
            --border-color: #d2d2d7;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        /* --- ТЕМНАЯ ТЕМА (ПО УМОЛЧАНИЮ) --- */
        body.dark-mode {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --card-bg: #1c1c1e;
            --header-bg: #1c1c1e;
            --accent-color: #2997ff;
            --border-color: #38383a;
            --modal-bg: rgba(0, 0, 0, 0.8);
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        /* --- БЛОКИРОВКА UI GOOGLE TRANSLATE --- */
        body { top: 0 !important; position: relative !important; }
        .skiptranslate, .goog-te-banner-frame, .VIpgJd-ZVi9od-aZ2wEe-wOHMyf, #goog-gt-tt { display: none !important; visibility: hidden !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; max-width: 1200px; margin: 0 auto;
        }

        header h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--accent-color); }

        .header-controls { display: flex; gap: 8px; align-items: center; }

        .currency-block {
            display: flex; align-items: center;
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; box-shadow: var(--shadow);
        }

        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* --- АДАПТИВНОЕ МЕНЮ --- */
        .tabs-container { 
            width: 100%; border-top: 1px solid var(--border-color); padding: 12px 0; background-color: var(--header-bg);
        }
        .tabs { 
            display: flex; flex-wrap: wrap; justify-content: center; padding: 0 15px; max-width: 1200px; margin: 0 auto; gap: 8px; 
        }

        .tab-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); 
            border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: #ffffff; border-color: var(--accent-color); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; min-height: 50vh; }

        #loader { text-align: center; display: none; padding: 40px 20px; font-weight: bold; color: var(--accent-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .news-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; box-shadow: var(--shadow); transition: transform 0.2s;
        }
        .news-card:hover { transform: translateY(-4px); }
        .news-card.top-story { grid-column: 1 / -1; border: 2px solid var(--accent-color); }

        .top-story-badge {
            background-color: var(--accent-color); color: white; padding: 4px 10px;
            border-radius: 6px; font-size: 0.75rem; font-weight: bold; margin-bottom: 12px; align-self: flex-start;
        }

        .news-source {
            display: inline-block; background: rgba(128, 128, 128, 0.15);
            color: var(--text-color); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem;
            font-weight: bold; margin-bottom: 10px; align-self: flex-start;
        }

        .news-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
        .news-title { font-size: 1.1rem; margin: 0 0 12px 0; line-height: 1.4; color: var(--text-color); }
        .news-card.top-story .news-title { font-size: 1.4rem; }
        .news-link { text-decoration: none; color: var(--accent-color); font-weight: 600; font-size: 0.9rem; align-self: flex-start; margin-top: auto; }

        .error-message { grid-column: 1 / -1; background: rgba(220, 53, 69, 0.1); color: #dc3545; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; border: 1px solid rgba(220, 53, 69, 0.3); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); color: var(--text-color); padding: 24px; border-radius: 16px; width: 90%; max-width: 600px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <h1 translate="no">News.</h1>
            <div class="header-controls">
                <div class="currency-block" onclick="openChartModal()" translate="no">
                    <span id="currency-rates">Курсы ⏳</span>
                </div>
                <button class="icon-btn" onclick="forceRefresh()" title="Обновить новости" translate="no">🔄</button>
                <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" translate="no">🌙</button>
            </div>
        </div>
        
        <div class="tabs-container" translate="no">
            <div class="tabs">
                <button class="tab-btn active" onclick="loadNews('WORLD', this)">В мире</button>
                <button class="tab-btn" onclick="loadNews('SCIENCE', this)">Наука</button>
                <button class="tab-btn" onclick="loadNews('POLITICS', this)">Политика</button>
                <button class="tab-btn" onclick="loadNews('BUSINESS', this)">Экономика</button>
                <button class="tab-btn" onclick="loadNews('TECHNOLOGY', this)">Технологии</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="loader" translate="no">Загрузка данных по защищенному каналу...</div>
        <div id="news-grid" class="news-grid"></div>
    </div>

    <div class="modal-overlay" id="chartModal" onclick="closeChartModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeChartModal(event)">&times;</span>
            <h3 style="margin-top:0; margin-bottom: 5px;" translate="no">Динамика ЦБ РФ</h3>
            <div id="chartLoader" style="text-align:center; padding: 20px; font-weight: bold; color: var(--accent-color);">Сбор данных...</div>
            <canvas id="currencyChart" style="display:none; width: 100%;"></canvas>
        </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>
    <script>
        document.cookie = "googtrans=/en/ru; path=/;";
        if (window.location.hostname) {
            document.cookie = `googtrans=/en/ru; path=/; domain=${window.location.hostname};`;
        }
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'ru', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // --- ТЕМА ОФОРМЛЕНИЯ ---
        const themeBtn = document.getElementById('theme-btn');
        function initTheme() {
            if (localStorage.getItem('theme') === 'light') { document.body.classList.remove('dark-mode'); themeBtn.textContent = '☀️'; } 
            else { document.body.classList.add('dark-mode'); themeBtn.textContent = '🌙'; }
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '🌙' : '☀️';
            
            if (chartInstance) {
                const color = isDark ? '#e0e0e0' : '#1d1d1f';
                const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
                chartInstance.options.scales.x.ticks.color = color; chartInstance.options.scales.y.ticks.color = color;
                chartInstance.options.scales.x.grid.color = gridColor; chartInstance.options.scales.y.grid.color = gridColor;
                chartInstance.update();
            }
        }
        initTheme();

        // --- БЕЗОПАСНЫЕ ИСТОЧНИКИ (ЗАМЕНИЛ HTTP НА HTTPS) ---
        const DIRECT_FEEDS = {
            WORLD: { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC World' },
            SCIENCE: { url: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml', name: 'BBC Science' },
            POLITICS: { url: 'https://feeds.bbci.co.uk/news/politics/rss.xml', name: 'BBC Politics' },
            BUSINESS: { url: 'https://feeds.bbci.co.uk/news/business/rss.xml', name: 'BBC Business' },
            TECHNOLOGY: { url: 'https://feeds.bbci.co.uk/news/technology/rss.xml', name: 'BBC Tech' }
        };

        const CACHE_TTL = 10 * 60 * 1000; // 10 минут
        let chartInstance = null;
        let currentTopic = 'WORLD'; // Запоминаем текущую вкладку

        // --- БЫСТРЫЙ И ПРОСТОЙ ЗАГРУЗЧИК ---
        async function fetchRSS(topic) {
            const targetUrl = DIRECT_FEEDS[topic].url;
            
            // 1. Пробуем быстрый rss2json
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(targetUrl)}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.status === 'ok') return formatItems(data.items.slice(0, 10), true);
                }
            } catch(e) { console.warn("rss2json пропущен"); }

            // 2. Страховочный CodeTabs (надежный, выдает чистый XML)
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
                if (res.ok) {
                    const text = await res.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
                    if (items.length) return formatItems(items, false);
                }
            } catch(e) { console.warn("CodeTabs пропущен"); }

            // 3. Страховочный CorsProxy.io
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                if (res.ok) {
                    const text = await res.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    const items = Array.from(xml.querySelectorAll("item")).slice(0, 10);
                    if (items.length) return formatItems(items, false);
                }
            } catch(e) { console.warn("CorsProxy пропущен"); }

            throw new Error("Все каналы недоступны");
        }

        function formatItems(items, isJson) {
            return items.map(item => ({
                title: isJson ? item.title : (item.querySelector("title")?.textContent || "Без заголовка"),
                link: isJson ? item.link : (item.querySelector("link")?.textContent || "#"),
                pubDate: isJson ? item.pubDate : (item.querySelector("pubDate")?.textContent || "")
            }));
        }

        // --- УПРАВЛЕНИЕ КЭШЕМ ---
        function getCache(topic) {
            const cached = localStorage.getItem('newsCache_' + topic);
            if (cached) {
                const parsed = JSON.parse(cached);
                if (Date.now() - parsed.timestamp < CACHE_TTL) {
                    return parsed.data;
                }
            }
            return null;
        }

        function setCache(topic, data) {
            localStorage.setItem('newsCache_' + topic, JSON.stringify({
                data: data,
                timestamp: Date.now()
            }));
        }

        // Принудительное обновление
        function forceRefresh() {
            localStorage.removeItem('newsCache_' + currentTopic);
            loadNews(currentTopic, document.querySelector('.tab-btn.active'));
        }

        // --- КУРСЫ ВАЛЮТ ---
        async function fetchCurrentRates() {
            try {
                const res = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                const data = await res.json();
                document.getElementById('currency-rates').innerHTML = 
                    `<span style="color:#34c759">$&nbsp;${data.Valute.USD.Value.toFixed(2)}</span>&nbsp;&nbsp;<span style="color:#ff3b30">€&nbsp;${data.Valute.EUR.Value.toFixed(2)}</span>`;
            } catch (e) { document.getElementById('currency-rates').textContent = 'Курсы недоступны'; }
        }

        async function openChartModal() {
            document.getElementById('chartModal').style.display = 'flex';
            if (chartInstance) return; 

            const loader = document.getElementById('chartLoader');
            const canvas = document.getElementById('currencyChart');
            loader.style.display = 'block'; canvas.style.display = 'none';

            const dates = [], usdData = [], eurData = [];
            let url = 'https://www.cbr-xml-daily.ru/daily_json.js';
            
            try {
                let days = 0, attempts = 0;
                while (days < 7 && attempts < 15) {
                    attempts++;
                    const res = await fetch(url);
                    if (!res.ok) break; 
                    const data = await res.json();
                    
                    dates.unshift(new Date(data.Date).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'}));
                    usdData.unshift(data.Valute.USD.Value);
                    eurData.unshift(data.Valute.EUR.Value);
                    
                    if (!data.PreviousURL) break;
                    url = data.PreviousURL.startsWith('//') ? 'https:' + data.PreviousURL : data.PreviousURL;
                    days++;
                }

                loader.style.display = 'none'; canvas.style.display = 'block';
                const ctx = canvas.getContext('2d');
                const isDark = document.body.classList.contains('dark-mode');
                const color = isDark ? '#e0e0e0' : '#1d1d1f';
                const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            { label: 'Доллар (₽)', data: usdData, borderColor: '#34c759', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3 },
                            { label: 'Евро (₽)', data: eurData, borderColor: '#ff3b30', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3 }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: color, font: {weight: 'bold'} } } },
                        scales: { x: { ticks: { color: color }, grid: { color: gridColor } }, y: { ticks: { color: color }, grid: { color: gridColor } } }
                    }
                });
            } catch (e) { loader.textContent = 'Ошибка графика.'; }
        }

        function closeChartModal(e) { document.getElementById('chartModal').style.display = 'none'; }

        // --- ОТРИСОВКА НОВОСТЕЙ В DOM ---
        function renderNewsCards(articles, sourceName) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';

            articles.forEach((article, index) => {
                let pubDateText = "Недавно";
                if (article.pubDate) {
                    pubDateText = new Date(article.pubDate.replace(/-/g, '/')).toLocaleString('ru-RU', {
                        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                    });
                }

                let cleanTitle = article.title.replace(/ - BBC News/g, '').trim();

                const card = document.createElement('div');
                card.className = index === 0 ? 'news-card top-story' : 'news-card';
                let badge = index === 0 ? '<div class="top-story-badge" translate="no">Главное событие</div>' : '';

                card.innerHTML = `
                    ${badge}
                    <div class="news-source" translate="no">${sourceName}</div>
                    <div class="news-date" translate="no">${pubDateText}</div>
                    <h3 class="news-title">${cleanTitle}</h3>
                    <a href="${article.link}" target="_blank" class="news-link" translate="no">Читать на сайте ↗</a>
                `;
                grid.appendChild(card);
            });
        }

        // --- ГЛАВНАЯ ФУНКЦИЯ УПРАВЛЕНИЯ ВКЛАДКАМИ ---
        async function loadNews(topic, buttonElement) {
            currentTopic = topic;
            
            if(buttonElement) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');
            }

            const grid = document.getElementById('news-grid');
            const loader = document.getElementById('loader');

            // 1. ПРОВЕРКА КЭША
            const cachedData = getCache(topic);
            if (cachedData) {
                console.log(`[Кэш] Загружено: ${topic}`);
                renderNewsCards(cachedData, DIRECT_FEEDS[topic].name);
                return;
            }

            // 2. ЗАГРУЗКА ИЗ СЕТИ
            grid.innerHTML = ''; 
            loader.style.display = 'block';

            try {
                const articles = await fetchRSS(topic);
                
                // Сохраняем свежие данные
                setCache(topic, articles);
                
                loader.style.display = 'none';
                renderNewsCards(articles, DIRECT_FEEDS[topic].name);

            } catch (error) {
                loader.style.display = 'none';
                grid.innerHTML = `<div class="error-message" translate="no">Серверы временно недоступны. Нажмите кнопку 🔄 в правом верхнем углу.</div>`;
            }
        }

        // Запуск при открытии страницы
        window.onload = () => {
            fetchCurrentRates();
            loadNews('WORLD', document.querySelector('.tab-btn.active'));
        };
    </script>
</body>
</html>
