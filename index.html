<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3615/3615127.png">
    <title>Global News</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f8;
            --text-color: #1d1d1f;
            --text-muted: #86868b;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --accent-color: #0066cc;
            --border-color: #d2d2d7;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --card-bg: #1c1c1e;
            --header-bg: #1c1c1e;
            --accent-color: #2997ff;
            --border-color: #38383a;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        body { top: 0 !important; position: relative !important; -webkit-tap-highlight-color: transparent; }
        .skiptranslate, .goog-te-banner-frame, #goog-gt-tt { display: none !important; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s;
        }

        header {
            background-color: var(--header-bg); border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100; padding-top: env(safe-area-inset-top);
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; max-width: 1200px; margin: 0 auto;
        }

        header h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--accent-color); }

        .header-controls { display: flex; gap: 8px; align-items: center; }

        .currency-block {
            display: flex; align-items: center; background: var(--card-bg); 
            border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; box-shadow: var(--shadow);
        }

        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            border-radius: 10px; width: 38px; height: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: var(--shadow);
        }

        /* --- МЕНЮ КАК В ИСХОДНИКЕ (2 СТРОКИ) --- */
        .tabs-container { 
            width: 100%; border-top: 1px solid var(--border-color); padding: 12px 0; background-color: var(--header-bg);
        }
        .tabs { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            padding: 0 15px; max-width: 360px; /* Ограничение ширины для принудительного переноса */
            margin: 0 auto; gap: 8px; 
        }

        .tab-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); 
            border-radius: 20px; padding: 7px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: #ffffff; border-color: var(--accent-color); }

        .container { max-width: 800px; margin: 15px auto; padding: 0 15px; min-height: 50vh; }

        /* --- КАРТОЧКИ --- */
        .news-grid { display: flex; flex-direction: column; gap: 15px; }

        .news-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 18px; padding: 18px; display: flex; flex-direction: column; box-shadow: var(--shadow);
        }
        .news-card.top-story { border: 2px solid var(--accent-color); }

        .top-story-badge {
            background-color: var(--accent-color); color: white; padding: 3px 8px;
            border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; align-self: flex-start;
        }

        .news-source {
            display: inline-block; background: rgba(128, 128, 128, 0.1);
            color: var(--text-color); padding: 3px 8px; border-radius: 6px; font-size: 0.7rem;
            font-weight: bold; margin-bottom: 8px; align-self: flex-start;
        }

        .news-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .cache-info { font-style: italic; opacity: 0.8; font-size: 0.7rem; margin-left: 5px; }

        .news-title { 
            font-size: 1.1rem; margin: 0 0 10px 0; line-height: 1.3; font-weight: 700; 
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .news-excerpt { 
            font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .news-link { text-decoration: none; color: var(--accent-color); font-weight: 700; font-size: 0.85rem; align-self: flex-start; margin-top: auto; }

        /* --- SKELETON LOADERS --- */
        .skeleton {
            background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-color) 50%, var(--border-color) 75%);
            background-size: 200% 100%; animation: skeleton-load 1.5s infinite; border-radius: 10px;
        }
        @keyframes skeleton-load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sk-badge { width: 60px; height: 14px; margin-bottom: 10px; }
        .sk-title { width: 90%; height: 20px; margin-bottom: 10px; }
        .sk-text { width: 100%; height: 14px; margin-bottom: 5px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--modal-bg); z-index: 1000; justify-content: center; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <h1 translate="no">News.</h1>
            <div class="header-controls">
                <div class="currency-block" onclick="openChartModal()" translate="no">
                    <span id="currency-rates">Курсы ⏳</span>
                </div>
                <button class="icon-btn" onclick="forceRefresh()" translate="no">🔄</button>
                <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" translate="no">🌙</button>
            </div>
        </div>
        
        <div class="tabs-container" translate="no">
            <div class="tabs">
                <button class="tab-btn active" onclick="loadNews('WORLD', this)">В мире</button>
                <button class="tab-btn" onclick="loadNews('SCIENCE', this)">Наука</button>
                <button class="tab-btn" onclick="loadNews('POLITICS', this)">Политика</button>
                <button class="tab-btn" onclick="loadNews('BUSINESS', this)">Экономика</button>
                <button class="tab-btn" onclick="loadNews('TECHNOLOGY', this)">Технологии</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="news-grid" class="news-grid"></div>
    </main>

    <div class="modal-overlay" id="chartModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; margin-bottom: 15px;" translate="no">Динамика ЦБ РФ</h3>
            <canvas id="currencyChart"></canvas>
        </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <script>
        // PWA Manifest
        const manifest = {
            "name": "Global News App", "short_name": "News.", "start_url": ".", "display": "standalone",
            "background_color": "#000000", "theme_color": "#000000",
            "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/3615/3615127.png", "sizes": "512x512", "type": "image/png" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('head').innerHTML += `<link rel="manifest" href="${manifestURL}">`;

        // Haptic Feedback
        const haptic = () => { if(navigator.vibrate) navigator.vibrate(40); };

        // Google Translate Cookie
        document.cookie = "googtrans=/en/ru; path=/;";
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'ru', autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function initTheme() {
            if (localStorage.getItem('theme') === 'light') { 
                document.body.classList.remove('dark-mode'); themeBtn.textContent = '☀️'; 
                document.querySelector('meta[name="theme-color"]').content = "#ffffff";
            } else { 
                document.body.classList.add('dark-mode'); themeBtn.textContent = '🌙'; 
                document.querySelector('meta[name="theme-color"]').content = "#000000";
            }
        }
        function toggleTheme() {
            haptic(); document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '🌙' : '☀️';
            document.querySelector('meta[name="theme-color"]').content = isDark ? "#000000" : "#ffffff";
        }
        initTheme();

        const FEEDS = {
            WORLD: { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC World' },
            SCIENCE: { url: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml', name: 'BBC Science' },
            POLITICS: { url: 'https://feeds.bbci.co.uk/news/politics/rss.xml', name: 'BBC Politics' },
            BUSINESS: { url: 'https://feeds.bbci.co.uk/news/business/rss.xml', name: 'BBC Business' },
            TECHNOLOGY: { url: 'https://feeds.bbci.co.uk/news/technology/rss.xml', name: 'BBC Tech' }
        };

        const CACHE_TTL = 15 * 60 * 1000;
        let currentTopic = 'WORLD';
        let chartInstance = null;

        function showSkeletons() {
            document.getElementById('news-grid').innerHTML = Array(4).fill(0).map(() => `
                <div class="news-card"><div class="skeleton sk-badge"></div><div class="skeleton sk-title"></div><div class="skeleton sk-text"></div></div>
            `).join('');
        }

        async function loadNews(topic, btn) {
            haptic(); currentTopic = topic;
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            const cached = localStorage.getItem('nCache_' + topic);
            if (cached) {
                const p = JSON.parse(cached);
                if (Date.now() - p.t < CACHE_TTL) { render(p.d, FEEDS[topic].name, p.t); return; }
            }

            showSkeletons();
            try {
                // Стабильный метод загрузки через rss2json
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(FEEDS[topic].url)}`);
                const data = await res.json();
                if(data.status === 'ok') {
                    const items = data.items.slice(0, 10);
                    localStorage.setItem('nCache_' + topic, JSON.stringify({d: items, t: Date.now()}));
                    render(items, FEEDS[topic].name, Date.now());
                }
            } catch (e) {
                document.getElementById('news-grid').innerHTML = '<div style="text-align:center; padding:40px; color:red;">Ошибка сети. Нажмите 🔄</div>';
            }
        }

        function render(items, source, ts) {
            const grid = document.getElementById('news-grid');
            const timeAgo = Math.floor((Date.now() - ts) / 60000);
            const timeStr = timeAgo < 1 ? 'только что' : `${timeAgo} мин. назад`;

            grid.innerHTML = items.map((item, i) => {
                const pubDate = new Date(item.pubDate).toLocaleString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'});
                return `
                <div class="news-card ${i === 0 ? 'top-story' : ''}">
                    ${i === 0 ? '<div class="top-story-badge" translate="no">ГЛАВНОЕ</div>' : ''}
                    <div class="news-source" translate="no">${source}</div>
                    <div class="news-date" translate="no">${pubDate} <span class="cache-info">⏱ ${timeStr}</span></div>
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-excerpt">${item.description.replace(/<[^>]*>/g, '')}</p>
                    <a href="${item.link}" target="_blank" class="news-link" translate="no">Читать на сайте ↗</a>
                </div>`;
            }).join('');
        }

        function forceRefresh() { haptic(); localStorage.removeItem('nCache_' + currentTopic); loadNews(currentTopic); }

        async function fetchCurrentRates() {
            try {
                const res = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                const data = await res.json();
                document.getElementById('currency-rates').innerHTML = 
                    `<span style="color:#34c759">$ ${data.Valute.USD.Value.toFixed(1)}</span>&nbsp;&nbsp;<span style="color:#ff3b30">€ ${data.Valute.EUR.Value.toFixed(1)}</span>`;
            } catch (e) {}
        }

        async function openChartModal() {
            haptic(); document.getElementById('chartModal').style.display = 'flex';
            if (chartInstance) return; 
            const dates = [], usdData = [], eurData = [];
            let url = 'https://www.cbr-xml-daily.ru/daily_json.js';
            try {
                for (let i = 0; i < 7; i++) {
                    const res = await fetch(url);
                    const data = await res.json();
                    dates.unshift(new Date(data.Date).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'}));
                    usdData.unshift(data.Valute.USD.Value);
                    eurData.unshift(data.Valute.EUR.Value);
                    url = 'https:' + data.PreviousURL;
                }
                const ctx = document.getElementById('currencyChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            { label: 'USD', data: usdData, borderColor: '#34c759', tension: 0.3, borderWidth: 3 },
                            { label: 'EUR', data: eurData, borderColor: '#ff3b30', tension: 0.3, borderWidth: 3 }
                        ]
                    },
                    options: { responsive: true }
                });
            } catch (e) {}
        }

        window.onload = () => { fetchCurrentRates(); loadNews('WORLD'); };
    </script>
</body>
</html>
